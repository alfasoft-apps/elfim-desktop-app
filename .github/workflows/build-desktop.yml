# Compile once → package Win + Mac in parallel → single GitHub Release upload (no publish race).

name: Release desktop app

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
  CSC_IDENTITY_AUTO_DISCOVERY: false
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  compile:
    name: Compile app (once)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - id: version
        name: Release version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: npm run build:ci
        env:
          VITE_REST_API_ENDPOINT: https://admin.elfim.az/api

      - uses: actions/upload-artifact@v6
        with:
          name: app-out
          path: out/
          retention-days: 1

  build-windows:
    name: Windows installer
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - uses: actions/download-artifact@v6
        with:
          name: app-out
          path: out

      - name: Package Windows (no publish)
        run: npm run dist:win

      - uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

  build-macos:
    name: macOS DMG + ZIP
    needs: compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - uses: actions/download-artifact@v6
        with:
          name: app-out
          path: out

      - name: Package macOS (no publish)
        run: npm run dist:mac

      - uses: actions/upload-artifact@v6
        with:
          name: macos-installer
          path: |
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [compile, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: windows-installer
          path: release

      - uses: actions/download-artifact@v6
        with:
          name: macos-installer
          path: release

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.compile.outputs.version }}
          name: ${{ needs.compile.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest.yml
            release/latest-mac.yml
